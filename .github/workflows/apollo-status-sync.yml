name: Apollo status sync

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

concurrency:
  group: apollo-status-sync-production
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - name: Refresh due Apollo contacts
        env:
          APOLLO_STATUS_SYNC_SECRET: ${{ secrets.APOLLO_STATUS_SYNC_SECRET }}
        run: |
          if [ -z "$APOLLO_STATUS_SYNC_SECRET" ]; then
            echo "The APOLLO_STATUS_SYNC_SECRET Actions secret is not configured."
            exit 1
          fi

          curl --fail-with-body \
            --silent \
            --show-error \
            --max-time 330 \
            --header "Authorization: Bearer $APOLLO_STATUS_SYNC_SECRET" \
            https://newl-apps.vercel.app/api/lead-gen/apollo/status-sync
