name: Apollo status sync

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

concurrency:
  group: apollo-status-sync-production
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - name: Refresh due Apollo contacts
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "The CRON_SECRET Actions secret is not configured."
            exit 1
          fi

          curl --fail-with-body \
            --silent \
            --show-error \
            --max-time 330 \
            --retry 2 \
            --retry-all-errors \
            --header "Authorization: Bearer $CRON_SECRET" \
            https://newl-apps.vercel.app/api/lead-gen/apollo/status-sync
